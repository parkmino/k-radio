name: Update KBS Stream URLs

on:
  schedule:
    - cron: '*/5 * * * *' # 매 5분마다 자동으로 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Fetch KBS URLs and Generate PLS Files
      run: |
        CHANNELS="1tv:11 2tv:12 world:14 news_d:81 drama:N91 joy:N92 life:N93 story:N94 kids:N96 1:nvod1 2:nvod2 3:nvod3 4:nvod4 5:nvod5 6:nvod6 7:nvod7 8:nvod8 9:nvod9 0:nvod10 1fm:24 2fm:25 1r:21 2r:22 3r:23 han:26 mul:wink11 eng:I92"
        
        # HTML 템플릿에 주입할 JSON 데이터 시작
        JSON_DATA="{"
        
        # 이전에 생성된 구형 m3u 파일이 있다면 삭제
        rm -f kbs_all.m3u
        
        # 각 채널별로 API 호출
        for ch_info in $CHANNELS; do
          name="${ch_info%%:*}"
          code="${ch_info##*:}"
          
          # API 호출 및 m3u8 주소 추출
          URL=$(curl -s "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/$code" | grep -o 'http[^"]*' | head -n 1 | sed 's/\\//g')
          
          if [ -n "$URL" ]; then
            echo "추출 성공: $name ($code)"
            
            # 💡 개별 PLS 파일 생성 (예: kbs_1tv.pls, kbs_1fm.pls 등)
            echo -e "[playlist]\nFile1=$URL\nTitle1=KBS $name\nLength1=-1\nNumberOfEntries=1\nVersion=2" > "kbs_${name}.pls"
            
            # JSON 데이터에 추가
            JSON_DATA+="\"$name\":\"$URL\","
          else
            echo "추출 실패: $name ($code)"
          fi
          
          # 서버 과부하 방지 지연
          sleep 0.5
        done
        
        # JSON 포맷 마무리 (마지막 콤마 제거)
        JSON_DATA="${JSON_DATA%,}}"
        JSON_DATA+="}"
        
        # template.html 치환하여 index.html 생성
        sed "s|{{CHANNELS_JSON}}|$JSON_DATA|g" template.html > index.html

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 변경된/생성된 모든 pls 파일과 index.html을 추가
        git add *.pls index.html
        
        # 이전 잔여물(m3u 등) 삭제 반영
        git add -u
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "정기 업데이트: 5분 주기 개별 PLS 반영" && git push)